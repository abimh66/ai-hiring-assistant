$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'python'
stack: 'backend'
layer: 'application'

tasks:
  dev:
    command: 'uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000'
    preset: 'server'
  worker:
    command: 'uv run celery -A app.worker:celery_app worker --loglevel=info'
    preset: 'server'
